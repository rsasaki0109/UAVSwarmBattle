# GPU MPPI counterpart of exp_multi_drone_3d_3.yaml — same 3-drone
# triangle crossing on the same 40×40×12 voxel_world. Validated 3D
# Pareto cell (n_samples=64, horizon=20). For the N-scaling sweep
# paired with MPC.

name: multi_drone_3d_3_gpu_mppi
seed: 42
num_episodes: 30

scenario:
  type: multi_drone_voxel
  size: [40, 40, 12]
  resolution: 1.0
  obstacles:
    type: random
    count: 30
    seed: 7
  drones:
    - name: alice
      start: [3.0, 3.0, 6.0]
      goal:  [37.0, 37.0, 6.0]
      radius: 0.4
    - name: bob
      start: [37.0, 3.0, 6.0]
      goal:  [3.0, 37.0, 6.0]
      radius: 0.4
    - name: charlie
      start: [20.0, 37.0, 6.0]
      goal:  [20.0, 3.0, 6.0]
      radius: 0.4

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: gpu_mppi
  max_speed: 8.0
  replan_period: 0.2
  horizon: 20
  dt_plan: 0.05
  n_samples: 64
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  temperature: 1.0

sensor:
  type: perfect

output:
  dir: results/multi_drone_3d_3_gpu_mppi
