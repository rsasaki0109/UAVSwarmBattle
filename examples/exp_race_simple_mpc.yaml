# Drone race + 2 slow bouncing obstacles (winnable avoidance hero).
#
# Designed to be solvable by both MPC and GPU MPPI: 4 drones on the
# 12 x 8 m oval, 2 SLOW obstacles (radius 1.0 m, |v|=1.5 m/s) bouncing
# vertically through the oval interior. Drone tangential speed is
# ~6.3 m/s at the long sides, obstacle 1.5 m/s -> closing rate ~7.8 m/s
# (vs the gates4 ~10 m/s + faster intruders, which was unsolvable).
#
# The combination of (i) just 2 obstacles, (ii) slow obstacles, and
# (iii) generous clearance (1.4 m sum vs ~3 m available swerve room
# at the oval centre) should give the planner enough margin to detour
# without dying every episode.
name: race_simple_mpc
seed: 42
num_episodes: 30

scenario:
  type: multi_drone_aerobatic
  size: [40, 40, 14]
  resolution: 1.0
  n_drones: 4
  pattern: synchronized_loop
  center: [20.0, 20.0, 7.0]
  radius: 12.0
  radius_y: 8.0
  period: 12.0
  n_loops: 2
  normal_axis: z
  lookahead_t: 0.4
  drone_radius: 0.4
  obstacles:
    type: none
  dynamic_obstacles:
    # Two slow vertical-bouncing obstacles centered on the oval interior.
    # Period 53.3 s at v=1.5 (40 m * 2 / 1.5), so each obstacle does
    # < 1 full sweep in the 24 s episode -- predictable for the planner.
    - {start: [20.0, 6.0, 7.0], velocity: [0.0, 1.5, 0.0], reflect: true, radius: 1.0}
    - {start: [20.0, 34.0, 7.0], velocity: [0.0, -1.5, 0.0], reflect: true, radius: 1.0}

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 480
  max_accel: 80.0
  goal_radius: 0.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 8.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 8
  resolution: 1.0
  inflate: 0
  goal_radius: 0.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  ctg_cache_tolerance: 3

sensor:
  type: perfect

output:
  dir: results/race_simple_mpc
