# warmup_select_mppi on intersection v1, σ=3.
# Episode 0 runs at warmup_temperature=1.0 (vanilla MPPI) and accumulates
# top-2 + chosen-vs-goal angles; episodes 1-19 run at the auto-selected
# temperature. Expected pick (per N+P rule): uniform t=10 (cvg=9.2° < 12.5°).
# Baseline t=10 sweep result on this cell: 100% joint success.
name: intersection_v1_noisy30_warmup_select_mppi_n20
seed: 42
num_episodes: 20

scenario:
  type: multi_drone_voxel
  size: [40, 40, 12]
  resolution: 1.0
  obstacles:
    type: none
  drones:
    - name: north
      start: [20.0, 4.0, 6.0]
      goal:  [20.0, 36.0, 6.0]
      radius: 0.4
    - name: east
      start: [36.0, 20.0, 6.0]
      goal:  [4.0, 20.0, 6.0]
      radius: 0.4
  dynamic_obstacles:
    - start: [20.0, 20.0, 6.0]
      velocity: [0.5, 0.0, 0.0]
      reflect: true
      radius: 1.0

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 800
  max_accel: 80.0
  goal_radius: 1.0
  drone_radius: 0.4

planner:
  type: warmup_select_mppi
  max_speed: 6.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 32
  resolution: 1.0
  inflate: 1
  goal_radius: 1.0
  safety_margin: 0.5
  use_prediction: true
  predictor:
    type: noisy_velocity
    velocity_noise_std: 3.0
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  warmup_temperature: 1.0
  uniform_temperature: 10.0
  argmin_temperature: 0.1
  appl_cut: 50.0
  choice_cut: 12.5

sensor:
  type: perfect

output:
  dir: results/intersection_v1_noisy30_warmup_select_mppi_n20
