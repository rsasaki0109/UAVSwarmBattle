# AirSim N=4 antipodal hub — real-flight reproduction of the right-of-way
# convention finding (the whole convention arc ran on a kinematic dummy sim;
# this lifts the headline into AirSim's Blocks Unreal physics: gravity,
# momentum, real mesh-to-mesh collision, the two-phase synchronized clock).
#
# Geometry: 4 drones on a cross, all at the SAME altitude (z=30), each
# swapping to the antipodal side through the shared centre (30,30,30):
#   east  (5,30,30)  -> (55,30,30)
#   west  (55,30,30) -> (5,30,30)
#   north (30,5,30)  -> (30,55,30)
#   south (30,55,30) -> (30,5,30)
# This is the N=4 antipodal hub = two head-on pairs crossing at one point.
# UNLIKE the demo (which staggers altitude by +-2 m to dodge the jam), the
# uniform altitude forces the genuine symmetric deadlock the convention is
# meant to break. The demo's own note: "even perfect CV peer prediction
# cannot perfectly coordinate 4 drones converging on (30,30,30)".
#
# The right-of-way knob is planner.lateral_bias (0 = stock). Sweep it with
# scripts/run_airsim_antipodal.sh and compare paired by seed.

name: airsim_antipodal_n4
seed: 42
num_episodes: 1

scenario:
  type: multi_drone_voxel
  size: [60, 60, 40]
  resolution: 1.0
  obstacles:
    type: none
  drones:
    - {name: east,  start: [5.0,  30.0, 30.0], goal: [55.0, 30.0, 30.0], radius: 0.4}
    - {name: west,  start: [55.0, 30.0, 30.0], goal: [5.0,  30.0, 30.0], radius: 0.4}
    - {name: north, start: [30.0, 5.0,  30.0], goal: [30.0, 55.0, 30.0], radius: 0.4}
    - {name: south, start: [30.0, 55.0, 30.0], goal: [30.0, 5.0,  30.0], radius: 0.4}

simulator:
  type: airsim
  host: 127.0.0.1
  port: 41451
  dt: 0.05
  max_steps: 500
  goal_radius: 2.5
  settle_after_reset: 1.0
  settle_after_teleport: 0.3
  vehicles: [Drone1, Drone2, Drone3, Drone4]

planner:
  type: mpc
  max_speed: 4.0
  replan_period: 0.2
  horizon: 30
  dt_plan: 0.05
  n_samples: 16
  resolution: 1.0
  inflate: 0
  goal_radius: 2.5
  safety_margin: 0.6
  use_prediction: true       # strong baseline: CV peer prediction is ON
  lateral_bias: 0.0          # right-of-way convention strength (0 = stock)
  w_goal: 1.0
  w_obs: 200.0
  w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/airsim_antipodal_n4
