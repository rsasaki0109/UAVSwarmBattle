# Post-1646e11 dynamic-obstacle retune — v2.
#
# v1 (exp_race_simple_retuned_n5_mpc.yaml) had period=20.0 which produced
# a deterministic drone-1 collision at t=29.6 s (narrow phase/geometry
# failure, not a planner limit). PLAN.md boundary probe found period=19.8
# and 19.9 give 3/3 joint success for both planners.
#
# v2 sets period=19.8 to land in the partial-success band where every
# drone actually avoids the two slow vertical-bouncing intruders. The
# scenario is otherwise identical to v1: oval 16 x 12 m, two obstacles
# radius 1.0 |v|=1.5 m/s, planner weights w_goal=0.3, w_obs=200.
name: race_simple_retuned_v2_mpc
seed: 42
num_episodes: 5

scenario:
  type: multi_drone_aerobatic
  size: [40, 40, 14]
  resolution: 1.0
  n_drones: 4
  pattern: synchronized_loop
  center: [20.0, 20.0, 7.0]
  radius: 16.0
  radius_y: 12.0
  period: 19.8
  n_loops: 2
  normal_axis: z
  lookahead_t: 0.4
  drone_radius: 0.4
  obstacles:
    type: none
  dynamic_obstacles:
    - {start: [20.0, 6.0, 7.0], velocity: [0.0, 1.5, 0.0], reflect: true, radius: 1.0}
    - {start: [20.0, 34.0, 7.0], velocity: [0.0, -1.5, 0.0], reflect: true, radius: 1.0}

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 800
  max_accel: 80.0
  goal_radius: 0.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 8.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 8
  resolution: 1.0
  inflate: 0
  goal_radius: 0.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 0.3
  w_obs: 200.0
  w_smooth: 0.05
  ctg_cache_tolerance: 3

sensor:
  type: perfect

output:
  dir: results/race_simple_retuned_v2_mpc
