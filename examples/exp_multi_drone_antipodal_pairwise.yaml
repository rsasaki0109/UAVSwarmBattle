# Antipodal swap (4 drones, 3D) — the PAIRWISE right-of-way that does NOT harm
# where the GLOBAL one does.
#
# This is the 3D antipodal-ring deadlock (every drone crosses to its antipode
# through one central hub), here with FOUR drones at mid-altitude z=8 and no
# obstacles, so peer coordination is the only thing the planner solves.
#
# WHY N=4 IS THE INTERESTING CELL (docs/findings.md "A pairwise winding-number
# right-of-way strictly dominates the global veer-right convention"):
#
#   N=4 in 3D does NOT deadlock on its own — the free vertical axis resolves the
#   square (b0 success = 30/30). It is exactly here that the GLOBAL convention
#   planner.lateral_bias BACKFIRES: a goal-blind, unconditional "veer right of my
#   own heading" by all four drones manufactures a coordinated in-plane pinwheel
#   that re-collides, dropping success to 0/30 (a proven harm — see the even-N
#   resonance finding).
#
#   The PAIRWISE convention planner.pairwise_bias avoids this. Instead of veering
#   right of its own goal heading unconditionally, each drone prefers to pass each
#   NEARBY neighbour on a consistent relative side, weighted by exp(-dist/radius).
#   With no neighbour in conflict the bias vanishes, so the four-drone square that
#   needed no help is left undisturbed: pairwise success = 30/30. And at the
#   deadlocking cells (N=6, N=8) it rescues the fleet to 30/30 exactly like the
#   global rule — so it is a STRICT improvement: same rescue, no collateral harm.
#
# Try it: this file uses pairwise_bias (100 %). Swap it for `lateral_bias: 2.0`
# (delete the two pairwise_* lines, uncomment lateral_bias) and the SAME four
# drones collapse to 0 %:
#   uav-nav run examples/exp_multi_drone_antipodal_pairwise.yaml
#   uav-nav eval results/antipodal_pairwise_demo
# Reproduce the full b0 / global / pairwise table (3D N=4/6/8 and 2D cliff):
#   python scripts/antipodal_pairwise_convention_phase.py --dim 3 --n-list 4 6 8 --episodes 30
#   python scripts/antipodal_pairwise_convention_phase.py --dim 2 --n-list 8 12 16 --episodes 30
name: antipodal_pairwise_demo
seed: 1000
num_episodes: 20

scenario:
  type: multi_drone_voxel
  size: [50, 50, 16]
  resolution: 1.0
  obstacles:
    type: none
  drones:
    - name: d0
      start: [45.0, 25.0, 8.0]
      goal:  [5.0, 25.0, 8.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d1
      start: [25.0, 45.0, 8.0]
      goal:  [25.0, 5.0, 8.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d2
      start: [5.0, 25.0, 8.0]
      goal:  [45.0, 25.0, 8.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d3
      start: [25.0, 5.0, 8.0]
      goal:  [25.0, 45.0, 8.0]
      radius: 0.4
      start_jitter: 0.8

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 800
  max_accel: 6.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 5.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 48
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  # The pairwise (winding-number-style) right-of-way: conditional on a nearby
  # neighbour, so it does NOT harm the no-deadlock N=4 square the way the global
  # `lateral_bias: 2.0` does (that drops these same drones to 0 %).
  pairwise_bias: 10.0
  pairwise_radius: 8.0
  # lateral_bias: 2.0   # <- swap in (and delete the two lines above) to see the harm
  predictor:
    type: constant_velocity

sensor:
  type: perfect

output:
  dir: results/antipodal_pairwise_demo
