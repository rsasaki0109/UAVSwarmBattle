# Antipodal swap (6 drones) lifted into a 3D voxel world with vertical room.
#
# This is the 2D antipodal-ring deadlock (every drone crosses to its antipode
# through one central hub) embedded in a voxel world 16 cells tall, with all six
# drones launched at the mid-altitude z=8. obstacles:none, so peer coordination
# is the ONLY thing the planner solves.
#
# WHY 3D CHANGES THE STORY (docs/findings.md "The antipodal predictor inversion
# is a 2D artifact — the vertical escape axis dissolves it, and at high density
# flips the predictor's sign"):
#
#   On a PLANE this exact scenario is the inversion trap: with predictor
#   game_theoretic the fleet shares one correct, symmetric forecast, mirror-
#   swerves SIDEWAYS into the same hub, and re-collides — N=6 scores ~2 % joint
#   success, WORSE than constant_velocity. "Sideways" is the whole problem, and
#   it is a 2D word: on a plane the only way past a head-on peer leads back to
#   the centre.
#
#   In 3D each drone can also climb or dive — an axis the symmetric in-plane
#   forecast never contests — so the deadlock DISSOLVES. game_theoretic reaches
#   40/40 = 100 % at every N=3..6 here (the 2D run collapses 37.5 % -> 2.5 %).
#
#   The twist: at this top density (N=6) the predictor's sign FLIPS versus 2D.
#   At N<=5 the vertical room is so generous the predictor is irrelevant
#   (constant_velocity also 100 %); but at N=6 constant_velocity COLLAPSES to
#   0/40 while game_theoretic holds 100 %. Once the vertical axis is the only
#   slack left, six drones can only stack their climbs/dives without re-colliding
#   if the forecast knows where peers are actually GOING. So in 3D at high
#   density goal-aware prediction goes from "liability" (2D) to REQUIRED.
#
# Try it: flip predictor between game_theoretic (100 %) and constant_velocity
# (0 % at this N=6 cell):
#   uav-nav run examples/exp_multi_drone_antipodal_3d.yaml
#   uav-nav eval results/antipodal_3d_demo
# Sweep / reproduce the full 2D-vs-3D table:
#   python scripts/antipodal_3d_phase.py --n-list 3 4 5 6 --episodes 40
name: antipodal_3d_demo
seed: 1000
num_episodes: 20

scenario:
  type: multi_drone_voxel
  size: [50, 50, 16]
  resolution: 1.0
  obstacles:
    type: none
  drones:
    - name: d0
      start: [45.0, 25.0, 8.0]
      goal:  [5.0, 25.0, 8.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d1
      start: [35.0, 42.32, 8.0]
      goal:  [15.0, 7.68, 8.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d2
      start: [15.0, 42.32, 8.0]
      goal:  [35.0, 7.68, 8.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d3
      start: [5.0, 25.0, 8.0]
      goal:  [45.0, 25.0, 8.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d4
      start: [15.0, 7.68, 8.0]
      goal:  [35.0, 42.32, 8.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d5
      start: [35.0, 7.68, 8.0]
      goal:  [15.0, 42.32, 8.0]
      radius: 0.4
      start_jitter: 0.8

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 1000
  max_accel: 6.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 5.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 48
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  predictor:
    type: game_theoretic   # 100% at N=6; constant_velocity collapses to 0%

sensor:
  type: perfect

output:
  dir: results/antipodal_3d_demo
