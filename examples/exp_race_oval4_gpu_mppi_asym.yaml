# Smart MPPI v2 (asymmetric perturbation) variant of exp_race_oval4_gpu_mppi.yaml.
# Rotates each drone's rollout base direction by a deterministic small
# perpendicular bias so the L/R symmetry of the rollout cloud is broken
# before softmax averaging. Targets the same §3 mode 2 cancellation
# regime as Smart v4 but from the *input* side (sampling) rather than
# the *output* side (cluster softmax).
name: race_oval4_gpu_mppi_asym
seed: 42
num_episodes: 30

scenario:
  type: multi_drone_aerobatic
  size: [40, 40, 14]
  resolution: 1.0
  n_drones: 4
  pattern: synchronized_loop
  center: [20.0, 20.0, 7.0]
  radius: 12.0
  radius_y: 8.0
  period: 12.0
  n_loops: 2
  normal_axis: z
  lookahead_t: 0.4
  drone_radius: 0.4
  obstacles:
    type: none
  dynamic_obstacles:
    - start: [20.0, 8.0, 7.0]
      velocity: [0.0, 6.0, 0.0]
      reflect: true
      radius: 1.2

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 480
  max_accel: 80.0
  goal_radius: 0.5
  drone_radius: 0.4

planner:
  type: gpu_mppi
  max_speed: 8.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 64
  resolution: 1.0
  inflate: 0
  goal_radius: 0.5
  safety_margin: 0.6
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  temperature: 1.0
  asymmetric_bias: 0.2
  ctg_cache_tolerance: 3

sensor:
  type: perfect

output:
  dir: results/race_oval4_gpu_mppi_asym
