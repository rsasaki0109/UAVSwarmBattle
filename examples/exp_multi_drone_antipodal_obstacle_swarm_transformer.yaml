# Antipodal (6 drones) + hub-crossing moving obstacle + learned transformer.
#
# Peers arrive as ally tokens (have ``goal``); the scene dynamic obstacle arrives
# as a threat token (no ``goal``). Train the threat-aware checkpoint:
#   python scripts/train_swarm_transformer_framework_bc.py --obstacle
#
# Compare MPC + convention baseline on the same geometry:
#   examples/exp_multi_drone_antipodal_obstacle.yaml
name: antipodal_obstacle_swarm_transformer_demo
seed: 6000
num_episodes: 20

scenario:
  type: multi_drone_grid
  size: [50, 50]
  resolution: 1.0
  obstacles:
    type: none
  dynamic_obstacles:
    - start: [25.0, 2.0]
      velocity: [0.0, 4.5]
      radius: 1.5
      reflect: true
  drones:
    - {name: d0, start: [45.0, 25.0],   goal: [5.0, 25.0],    radius: 0.4, start_jitter: 0.8}
    - {name: d1, start: [35.0, 42.32],  goal: [15.0, 7.68],   radius: 0.4, start_jitter: 0.8}
    - {name: d2, start: [15.0, 42.32],  goal: [35.0, 7.68],   radius: 0.4, start_jitter: 0.8}
    - {name: d3, start: [5.0, 25.0],    goal: [45.0, 25.0],   radius: 0.4, start_jitter: 0.8}
    - {name: d4, start: [15.0, 7.68],   goal: [35.0, 42.32],  radius: 0.4, start_jitter: 0.8}
    - {name: d5, start: [35.0, 7.68],   goal: [15.0, 42.32],  radius: 0.4, start_jitter: 0.8}

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1000
  max_accel: 6.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: swarm_transformer
  max_speed: 5.0
  replan_period: 0.2
  neighbor_dist: 15.0
  interaction_radius: 4.0
  goal_radius: 1.5
  predictor:
    type: game_theoretic
  checkpoint: results/swarm_transformer_framework_obstacle_rl_best.npz

sensor:
  type: perfect

output:
  dir: results/antipodal_obstacle_swarm_transformer_demo
