# E2 chokepoint intersection: extend intersection_v1 by adding 4 static
# corner cubes that narrow the centre intersection to an 8 m × 8 m
# open square. Each drone has to thread the chokepoint while also
# avoiding the slow centre intruder. The hope (per GPT pro's E2
# proposal) is that the lateral gap is small enough that swerving and
# stopping both have a non-trivial cost, so operational metrics
# (min_TTC, clearance CDF, max |Δcmd|) separate the planners further.
#
# Reproduce:
#   uav-nav run examples/exp_intersection_chokepoint_v1_mppi.yaml
name: intersection_chokepoint_noisy30_t30_mppi_n20
seed: 42
num_episodes: 20

scenario:
  type: multi_drone_voxel
  size: [40, 40, 12]
  resolution: 1.0
  obstacles:
    type: none
    boxes:
      - {center: [26, 26, 6], size: [4, 4, 4]}   # NE corner cube
      - {center: [14, 26, 6], size: [4, 4, 4]}   # NW corner cube
      - {center: [26, 14, 6], size: [4, 4, 4]}   # SE corner cube
      - {center: [14, 14, 6], size: [4, 4, 4]}   # SW corner cube
  drones:
    - name: north
      start: [20.0, 4.0, 6.0]
      goal:  [20.0, 36.0, 6.0]
      radius: 0.4
    - name: east
      start: [36.0, 20.0, 6.0]
      goal:  [4.0, 20.0, 6.0]
      radius: 0.4
  dynamic_obstacles:
    - start: [20.0, 20.0, 6.0]
      velocity: [0.5, 0.0, 0.0]
      reflect: true
      radius: 1.0

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 800
  max_accel: 80.0
  goal_radius: 1.0
  drone_radius: 0.4

planner:
  type: mppi
  max_speed: 6.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 32
  resolution: 1.0
  inflate: 1
  goal_radius: 1.0
  safety_margin: 0.5
  use_prediction: true
  predictor:
    type: noisy_velocity
    velocity_noise_std: 3.0
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  temperature: 3.0

sensor:
  type: perfect

output:
  dir: results/intersection_chokepoint_noisy30_t30_mppi_n20
