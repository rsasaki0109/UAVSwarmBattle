# AirSim multi-drone static-cube density sweep — central-soft candidate.
#
# Same planner occupancy as central, but the north/south AirSim meshes are
# thin needles (scale 0.05). This tests whether the central blocker can pull
# GPU MPPI below ceiling without driving joint success to 0/30.

name: airsim_multi_discriminating_central_soft_n30
seed: 42
num_episodes: 30

scenario:
  type: multi_drone_voxel
  size: [60, 60, 40]
  resolution: 1.0
  obstacles:
    type: none
    boxes:
      - {min: [15, 33, 22], max: [15, 33, 38]}
      - {min: [25, 27, 22], max: [25, 27, 38]}
      - {min: [35, 33, 22], max: [35, 33, 38]}
      - {min: [45, 27, 22], max: [45, 27, 38]}
      - {min: [27, 15, 22], max: [27, 15, 38]}
      - {min: [29, 33, 22], max: [29, 33, 38]}
  drones:
    - {name: east,  start: [5.0,  30.0, 28.0], goal: [55.0, 30.0, 28.0], radius: 0.4}
    - {name: west,  start: [55.0, 30.0, 32.0], goal: [5.0,  30.0, 32.0], radius: 0.4}
    - {name: north, start: [30.0, 5.0,  30.0], goal: [30.0, 55.0, 30.0], radius: 0.4}
    - {name: south, start: [26.0, 55.0, 26.0], goal: [26.0, 5.0,  26.0], radius: 0.4}

simulator:
  type: airsim
  host: 127.0.0.1
  port: 41451
  dt: 0.05
  max_steps: 500
  goal_radius: 2.5
  settle_after_reset: 1.0
  settle_after_teleport: 0.3
  vehicles: [Drone1, Drone2, Drone3, Drone4]
  static_obstacles:
    - {name: uavnav_disc_ew_15, asset: 1M_Cube_Chamfer, position: [15.5, 33.5, 30.5], scale: [0.3, 0.3, 17.0]}
    - {name: uavnav_disc_ew_25, asset: 1M_Cube_Chamfer, position: [25.5, 27.5, 30.5], scale: [0.3, 0.3, 17.0]}
    - {name: uavnav_disc_ew_35, asset: 1M_Cube_Chamfer, position: [35.5, 33.5, 30.5], scale: [0.3, 0.3, 17.0]}
    - {name: uavnav_disc_ew_45, asset: 1M_Cube_Chamfer, position: [45.5, 27.5, 30.5], scale: [0.3, 0.3, 17.0]}
    - {name: uavnav_disc_ns_27_15, asset: 1M_Cube_Chamfer, position: [27.5, 15.5, 30.5], scale: [0.05, 0.05, 17.0]}
    - {name: uavnav_disc_ns_29_33, asset: 1M_Cube_Chamfer, position: [29.5, 33.5, 30.5], scale: [0.05, 0.05, 17.0]}

planner:
  type: mpc
  max_speed: 4.0
  replan_period: 0.2
  horizon: 30
  dt_plan: 0.05
  n_samples: 16
  resolution: 1.0
  inflate: 3
  goal_radius: 2.5
  safety_margin: 0.6
  use_prediction: true
  w_goal: 1.0
  w_obs: 200.0
  w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/airsim_multi_discriminating_central_soft_n30_mpc
  save_camera_frames: false
