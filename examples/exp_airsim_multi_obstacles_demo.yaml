      - [33, 45, 34]
      - [33, 45, 35]
      - [33, 45, 36]
      - [33, 45, 37]
      - [33, 45, 38]
  # Dynamic spheres crossing the volume at "gap" altitudes between
  # the drones' transit z's (drones at z=26/28/30/32, spheres at
  # z=27/29/31). The 2.5 m/s sphere speed gives MPC's 1.5 s horizon
  # enough lookahead to plan around them; reflection at world bounds
  # keeps them cycling through the crossing region the whole episode.
  dynamic_obstacles:
    - {start: [10.0, 30.0, 27.0], velocity: [2.5,  0.0, 0.0], radius: 1.2, reflect: true}
    - {start: [50.0, 30.0, 31.0], velocity: [-2.5, 0.0, 0.0], radius: 1.2, reflect: true}
    - {start: [30.0, 10.0, 29.0], velocity: [0.0,  2.5, 0.0], radius: 1.2, reflect: true}
    - {start: [30.0, 50.0, 27.0], velocity: [0.0, -2.5, 0.0], radius: 1.2, reflect: true}
  drones:
    - {name: east,  start: [5.0,  30.0, 28.0], goal: [55.0, 30.0, 28.0], radius: 0.4}
    - {name: west,  start: [55.0, 30.0, 32.0], goal: [5.0,  30.0, 32.0], radius: 0.4}
    - {name: north, start: [30.0, 5.0,  30.0], goal: [30.0, 55.0, 30.0], radius: 0.4}
    - {name: south, start: [30.0, 55.0, 26.0], goal: [30.0, 5.0,  26.0], radius: 0.4}

simulator:
  type: airsim
  host: 127.0.0.1
  port: 41451
  dt: 0.05
  max_steps: 600    # bumped from demo's 400 to allow curve-following
  goal_radius: 2.5
  settle_after_reset: 1.0
  settle_after_teleport: 0.3
  vehicles: [Drone1, Drone2, Drone3, Drone4]
  cameras:
    - {name: "front_center", image_type: scene}

planner:
  type: mpc
  max_speed: 4.0
  replan_period: 0.2
  horizon: 30
  dt_plan: 0.05
  n_samples: 16
  resolution: 1.0
  inflate: 3          # 7×7×7 forbidden region per cell. Pillars
                      # already block the z-dip shortcut, so this
                      # value only needs to widen y/x reachability —
                      # planner picks horizontal detours by default
  goal_radius: 2.5
  safety_margin: 0.6
  use_prediction: true
  w_goal: 1.0
  w_obs: 200.0
  w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/airsim_multi_obstacles_demo
  save_camera_frames: true
