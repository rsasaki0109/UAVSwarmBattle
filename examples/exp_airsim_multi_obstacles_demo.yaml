      - [27, 35, 27]
      - [27, 35, 28]
      - [27, 35, 29]
      - [27, 35, 30]
      - [27, 35, 31]
      - [27, 35, 32]
      - [27, 35, 33]
      - [27, 35, 34]
      - [27, 35, 35]
