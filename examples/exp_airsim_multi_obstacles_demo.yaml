# AirSim multi-drone with virtual planner obstacles — MPC baseline.
#
# Same 4-drone Blocks crossing as `exp_airsim_multi_demo.yaml`
# (staggered altitudes, CV peer prediction), but the planner's
# static map now carries 30 random voxel obstacles at the crossing
# altitude band. The obstacles are *virtual* — AirSim's physics
# engine sees an empty scene at z=28-32 (Blocks cubes are well below),
# but each drone's planner treats them as hard constraints, so
# trajectories curve through the volume instead of flying straight.
#
# Purpose: produce visually-dynamic 4-drone GIFs for the README hero
# row that show the planner family actually weaving (the original
# `exp_airsim_multi_demo.yaml` produces straight-line flight because
# the no-obstacle staggered geometry doesn't exercise the avoidance
# layer). The pair `exp_airsim_multi_obstacles_demo_gpu_mppi.yaml`
# does the same with `gpu_mppi`, so side-by-side rendering via
# `scripts/record_airsim_multi_compare.py` (pointed at these YAMLs)
# captures the planner-family difference under non-trivial avoidance.
#
# Note: obstacles are only in the planner's *occupancy* map, NOT the
# Blocks scene. Drone1's front-center camera (Blocks FPV) sees the
# normal Unreal env. The curvature is visible in the FPV as the
# drone yaws/banks around invisible cubes.
#
# Run:
#   uav-nav run examples/exp_airsim_multi_obstacles_demo.yaml
#   uav-nav run examples/exp_airsim_multi_obstacles_demo_gpu_mppi.yaml
# Render the side-by-side GIF for the README hero row:
#   python scripts/record_airsim_multi_compare.py
#   (point its RUNS list at these two YAMLs first)

name: airsim_multi_obstacles_demo
seed: 42
num_episodes: 1

scenario:
  type: multi_drone_voxel
  size: [60, 60, 40]
  resolution: 1.0
  # Four pillar walls + slab obstacles surrounding the (30, 30)
  # crossing centre. Each pillar is a 1-cell-wide vertical column
  # spanning z=26-32 (the full drone-altitude band), positioned at
  # x,y ∈ {22, 38} so every drone's straight-line path through y=30
  # or x=30 is blocked at the centre. The four corner pillars force
  # east/west and north/south alike to weave around the centre block.
  # Eight additional "slab" cells stretch perpendicular to each
  # drone's flight line at the crossing centre — they don't block
  # the straight path but make the corridor narrow enough that the
  # MPC + GPU MPPI obstacle terms produce visible avoidance arcs.
  obstacles:
    type: random   # ignored when `cells` is set (voxel_world.py)
    # Vertical pillars (z=22..38 full drone band) placed with mirrored
    # y/x offsets along each drone's path so the planner is forced
    # into a horizontal S-snake instead of dipping below the obstacle.
    # Combined with `planner.inflate: 3` each pillar inflates to a
    # 7×7×(pillar_height+6) forbidden volume.
    #
    # East/west share the y=30 line (z=28 and z=32 respectively). Pillars
    # along that line, offset alternately in y so the planner must zigzag:
    #   x=15, y=33  → drone detours to y<30
    #   x=25, y=27  → drone detours to y>30
    #   x=35, y=33  → drone detours to y<30
    #   x=45, y=27  → drone detours to y>30
    # North/south share the x=30 line (z=30 and z=26). Same offset pattern
    # transposed:
    #   y=15, x=27  / y=25, x=33  / y=35, x=27  / y=45, x=33
    cells:
      # East/west zigzag pillars (z=22..38, every column)
      - [15, 33, 22]
      - [15, 33, 23]
      - [15, 33, 24]
      - [15, 33, 25]
      - [15, 33, 26]
      - [15, 33, 27]
      - [15, 33, 28]
      - [15, 33, 29]
      - [15, 33, 30]
      - [15, 33, 31]
      - [15, 33, 32]
      - [15, 33, 33]
      - [15, 33, 34]
      - [15, 33, 35]
      - [15, 33, 36]
      - [15, 33, 37]
      - [15, 33, 38]
      - [25, 27, 22]
      - [25, 27, 23]
      - [25, 27, 24]
      - [25, 27, 25]
      - [25, 27, 26]
      - [25, 27, 27]
      - [25, 27, 28]
      - [25, 27, 29]
      - [25, 27, 30]
      - [25, 27, 31]
      - [25, 27, 32]
      - [25, 27, 33]
      - [25, 27, 34]
      - [25, 27, 35]
      - [25, 27, 36]
      - [25, 27, 37]
      - [25, 27, 38]
      - [35, 33, 22]
      - [35, 33, 23]
      - [35, 33, 24]
      - [35, 33, 25]
      - [35, 33, 26]
      - [35, 33, 27]
      - [35, 33, 28]
      - [35, 33, 29]
      - [35, 33, 30]
      - [35, 33, 31]
      - [35, 33, 32]
      - [35, 33, 33]
      - [35, 33, 34]
      - [35, 33, 35]
      - [35, 33, 36]
      - [35, 33, 37]
      - [35, 33, 38]
      - [45, 27, 22]
      - [45, 27, 23]
      - [45, 27, 24]
      - [45, 27, 25]
      - [45, 27, 26]
      - [45, 27, 27]
      - [45, 27, 28]
      - [45, 27, 29]
      - [45, 27, 30]
      - [45, 27, 31]
      - [45, 27, 32]
      - [45, 27, 33]
      - [45, 27, 34]
      - [45, 27, 35]
      - [45, 27, 36]
      - [45, 27, 37]
      - [45, 27, 38]
      # North/south zigzag pillars (transposed)
      - [27, 15, 22]
      - [27, 15, 23]
      - [27, 15, 24]
      - [27, 15, 25]
      - [27, 15, 26]
      - [27, 15, 27]
      - [27, 15, 28]
      - [27, 15, 29]
      - [27, 15, 30]
      - [27, 15, 31]
      - [27, 15, 32]
      - [27, 15, 33]
      - [27, 15, 34]
      - [27, 15, 35]
