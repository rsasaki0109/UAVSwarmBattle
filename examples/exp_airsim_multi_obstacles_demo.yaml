      - [27, 35, 37]
      - [27, 35, 38]
      - [33, 45, 22]
      - [33, 45, 23]
      - [33, 45, 24]
      - [33, 45, 25]
      - [33, 45, 26]
      - [33, 45, 27]
      - [33, 45, 28]
      - [33, 45, 29]
      - [33, 45, 30]
      - [33, 45, 31]
      - [33, 45, 32]
