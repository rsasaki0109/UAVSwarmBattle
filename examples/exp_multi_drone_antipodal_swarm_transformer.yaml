# Antipodal swap (6 drones) with a learned TeamHOI-style transformer policy.
#
# Trained checkpoint (convention teacher BC):
#   python scripts/train_swarm_transformer_checkpoint.py
#
# Compare against ORCA baseline:
#   examples/exp_multi_drone_antipodal_orca.yaml
name: antipodal_swarm_transformer_demo
seed: 1000
num_episodes: 10

scenario:
  type: multi_drone_grid
  size: [50, 50]
  resolution: 1.0
  obstacles:
    type: none
  drones:
    - name: d0
      start: [45.0, 25.0]
      goal:  [5.0, 25.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d1
      start: [35.0, 42.32]
      goal:  [15.0, 7.68]
      radius: 0.4
      start_jitter: 0.8
    - name: d2
      start: [15.0, 42.32]
      goal:  [35.0, 7.68]
      radius: 0.4
      start_jitter: 0.8
    - name: d3
      start: [5.0, 25.0]
      goal:  [45.0, 25.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d4
      start: [15.0, 7.68]
      goal:  [35.0, 42.32]
      radius: 0.4
      start_jitter: 0.8
    - name: d5
      start: [35.0, 7.68]
      goal:  [15.0, 42.32]
      radius: 0.4
      start_jitter: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1000
  max_accel: 6.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: swarm_transformer
  max_speed: 5.0
  neighbor_dist: 15.0
  interaction_radius: 4.0
  goal_radius: 1.5
  checkpoint: results/swarm_transformer_framework_conv.npz

sensor:
  type: perfect

output:
  dir: results/antipodal_swarm_transformer_demo
