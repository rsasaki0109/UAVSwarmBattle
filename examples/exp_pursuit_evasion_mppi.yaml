# Pursuit-evasion: a single drone must cross the field to its goal while an
# intelligent "intercept" obstacle hunts it by leading its motion (proportional
# navigation), plus a couple of constant-velocity blockers for texture.
#
#   uav-nav run examples/exp_pursuit_evasion_mppi.yaml
#   uav-nav anim results/<run> --fps 20      # watch the chase
#
# The pursuer reads the drone's position each step (set_targets) and aims where
# the drone *will be*; turn_rate caps how sharply it can cut, so a decisive
# evasive juke can shake it. See uav_nav_lab/scenario/grid_world.py.
#
# Is anticipating the hunter (planner.use_prediction) worth it? See the honest
# study in scripts/pursuit_prediction_speed_phase.py and docs/findings.md.
# Two caveats it surfaces:
#   1. As shipped this scenario is DETERMINISTIC (single drone, perfect sensor,
#      fixed geometry) — the episode seed changes nothing, so every cell is
#      all-or-nothing and num_episodes>1 buys no statistical power. To make it a
#      real paired test, add `start_jitter` to the dynamic obstacles (see the
#      sweep) so each seed is a different chase.
#   2. The value is gated by ESCAPABILITY. With per-seed jitter and the hunter
#      slower than the drone (max_speed 3.0), prediction is a large, significant
#      win — at hunter speed 2.7 it lifts evasion 50% -> 97% (paired McNemar
#      c=28/b=0, p<1e-4). Once the hunter reaches the drone's own speed the chase
#      is unwinnable and prediction adds nothing (p>=0.5): the feature helps only
#      where escape is physically possible, peaking in the mid-band where the
#      reactive planner is a coin-flip but prediction still escapes.
name: pursuit_evasion_mppi
seed: 0
num_episodes: 5

scenario:
  type: grid_world
  size: [40, 40]
  start: [2.0, 20.0]
  goal: [38.0, 20.0]
  obstacles:
    type: none
  dynamic_obstacles:
    # the hunter — leads the drone, slightly slower so evasion is possible
    - start: [20.0, 20.0]
      policy: intercept
      speed: 2.4
      turn_rate: 1.2
      radius: 1.0
      reflect: false
    # two linear blockers drifting across the lane
    - start: [14.0, 6.0]
      velocity: [0.0, 1.4]
      radius: 1.0
    - start: [28.0, 34.0]
      velocity: [0.0, -1.4]
      radius: 1.0

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1200
  max_accel: 20.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mppi
  max_speed: 3.0
  replan_period: 0.1
  horizon: 40
  dt_plan: 0.05
  n_samples: 32
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true   # anticipate the moving threats (incl. the hunter)
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  temperature: 1.0

sensor:
  type: perfect

output:
  dir: results/pursuit_evasion_mppi
