# city_3x3 baseline: uniform MPPI
name: city_3x3_noisy30_t100_mppi_n20
seed: 42
num_episodes: 20

scenario:
  type: multi_drone_voxel
  size: [80, 80, 12]
  resolution: 1.0
  obstacles:
    type: none
    boxes:
      - {center: [12, 12, 5], size: [18, 18, 10]}
      - {center: [40, 12, 5], size: [18, 18, 10]}
      - {center: [68, 12, 5], size: [18, 18, 10]}
      - {center: [12, 40, 5], size: [18, 18, 10]}
      - {center: [40, 40, 5], size: [18, 18, 10]}
      - {center: [68, 40, 5], size: [18, 18, 10]}
      - {center: [12, 68, 5], size: [18, 18, 10]}
      - {center: [40, 68, 5], size: [18, 18, 10]}
      - {center: [68, 68, 5], size: [18, 18, 10]}
  drones:
    - {name: east,  start: [3.0, 26.0, 6.0],  goal: [77.0, 26.0, 6.0], radius: 0.4}
    - {name: west,  start: [77.0, 54.0, 6.0], goal: [3.0, 54.0, 6.0],  radius: 0.4}
    - {name: north, start: [26.0, 3.0, 6.0],  goal: [26.0, 77.0, 6.0], radius: 0.4}
    - {name: south, start: [54.0, 77.0, 6.0], goal: [54.0, 3.0, 6.0],  radius: 0.4}
  dynamic_obstacles:
    - {start: [26.0, 26.0, 6.0], velocity: [0.5, 0.0, 0.0], reflect: true, radius: 1.0}

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.0
  drone_radius: 0.4

planner:
  type: mppi
  max_speed: 8.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 32
  resolution: 1.0
  inflate: 1
  goal_radius: 1.0
  safety_margin: 0.5
  use_prediction: true
  predictor: {type: noisy_velocity, velocity_noise_std: 3.0}
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  temperature: 10.0

sensor:
  type: perfect

output:
  dir: results/city_3x3_noisy30_t100_mppi_n20
