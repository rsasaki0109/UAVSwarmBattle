      - [27, 15, 35]
      - [27, 15, 36]
      - [27, 15, 37]
      - [27, 15, 38]
      - [33, 25, 22]
      - [33, 25, 23]
      - [33, 25, 24]
      - [33, 25, 25]
      - [33, 25, 26]
