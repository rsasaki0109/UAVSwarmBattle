# AirSim multi-drone with virtual planner obstacles — GPU MPPI pair.
#
# Pair of `exp_airsim_multi_obstacles_demo.yaml` (MPC baseline).
# Same staggered-altitude 4-drone crossing + 30 virtual obstacles at
# the z=30 layer, planner swapped to gpu_mppi at the 3D Pareto cell.
# Used for the README hero side-by-side GIF showing both planner
# families weaving through the same obstacle layer.

name: airsim_multi_obstacles_demo_gpu_mppi
seed: 42
num_episodes: 1

scenario:
  type: multi_drone_voxel
  size: [60, 60, 40]
  resolution: 1.0
  obstacles:
    type: random   # ignored when `cells` is set (voxel_world.py)
    # Vertical pillars (z=22..38 full drone band) placed with mirrored
    # y/x offsets along each drone's path so the planner is forced
    # into a horizontal S-snake instead of dipping below the obstacle.
    # Combined with `planner.inflate: 3` each pillar inflates to a
    # 7×7×(pillar_height+6) forbidden volume.
    #
    # East/west share the y=30 line (z=28 and z=32 respectively). Pillars
    # along that line, offset alternately in y so the planner must zigzag:
    #   x=15, y=33  → drone detours to y<30
    #   x=25, y=27  → drone detours to y>30
    #   x=35, y=33  → drone detours to y<30
    #   x=45, y=27  → drone detours to y>30
    # North/south share the x=30 line (z=30 and z=26). Same offset pattern
    # transposed:
    #   y=15, x=27  / y=25, x=33  / y=35, x=27  / y=45, x=33
    cells:
      # East/west zigzag pillars (z=22..38, every column)
      - [15, 33, 22]
      - [15, 33, 23]
      - [15, 33, 24]
      - [15, 33, 25]
      - [15, 33, 26]
      - [15, 33, 27]
      - [15, 33, 28]
      - [15, 33, 29]
      - [15, 33, 30]
      - [15, 33, 31]
      - [15, 33, 32]
      - [15, 33, 33]
      - [15, 33, 34]
      - [15, 33, 35]
      - [15, 33, 36]
      - [15, 33, 37]
      - [15, 33, 38]
      - [25, 27, 22]
      - [25, 27, 23]
      - [25, 27, 24]
      - [25, 27, 25]
      - [25, 27, 26]
      - [25, 27, 27]
      - [25, 27, 28]
      - [25, 27, 29]
      - [25, 27, 30]
      - [25, 27, 31]
      - [25, 27, 32]
      - [25, 27, 33]
      - [25, 27, 34]
      - [25, 27, 35]
      - [25, 27, 36]
      - [25, 27, 37]
      - [25, 27, 38]
      - [35, 33, 22]
      - [35, 33, 23]
      - [35, 33, 24]
      - [35, 33, 25]
      - [35, 33, 26]
      - [35, 33, 27]
      - [35, 33, 28]
      - [35, 33, 29]
      - [35, 33, 30]
      - [35, 33, 31]
      - [35, 33, 32]
      - [35, 33, 33]
      - [35, 33, 34]
      - [35, 33, 35]
      - [35, 33, 36]
      - [35, 33, 37]
      - [35, 33, 38]
      - [45, 27, 22]
      - [45, 27, 23]
      - [45, 27, 24]
      - [45, 27, 25]
      - [45, 27, 26]
      - [45, 27, 27]
      - [45, 27, 28]
      - [45, 27, 29]
      - [45, 27, 30]
      - [45, 27, 31]
      - [45, 27, 32]
      - [45, 27, 33]
      - [45, 27, 34]
      - [45, 27, 35]
      - [45, 27, 36]
      - [45, 27, 37]
      - [45, 27, 38]
      # North/south zigzag pillars (transposed)
      - [27, 15, 22]
      - [27, 15, 23]
      - [27, 15, 24]
      - [27, 15, 25]
      - [27, 15, 26]
      - [27, 15, 27]
      - [27, 15, 28]
      - [27, 15, 29]
