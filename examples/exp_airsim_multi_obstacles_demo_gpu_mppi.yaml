  # Same dynamic spheres as the MPC pair YAML.
  dynamic_obstacles:
    - {start: [10.0, 30.0, 27.0], velocity: [2.5,  0.0, 0.0], radius: 1.2, reflect: true}
    - {start: [50.0, 30.0, 31.0], velocity: [-2.5, 0.0, 0.0], radius: 1.2, reflect: true}
    - {start: [30.0, 10.0, 29.0], velocity: [0.0,  2.5, 0.0], radius: 1.2, reflect: true}
    - {start: [30.0, 50.0, 27.0], velocity: [0.0, -2.5, 0.0], radius: 1.2, reflect: true}
  drones:
    - {name: east,  start: [5.0,  30.0, 28.0], goal: [55.0, 30.0, 28.0], radius: 0.4}
    - {name: west,  start: [55.0, 30.0, 32.0], goal: [5.0,  30.0, 32.0], radius: 0.4}
    - {name: north, start: [30.0, 5.0,  30.0], goal: [30.0, 55.0, 30.0], radius: 0.4}
    - {name: south, start: [30.0, 55.0, 26.0], goal: [30.0, 5.0,  26.0], radius: 0.4}

simulator:
  type: airsim
  host: 127.0.0.1
  port: 41451
  dt: 0.05
  max_steps: 1000     # GPU MPPI 1.87 m/s × curving = longer
  goal_radius: 2.5
  settle_after_reset: 1.0
  settle_after_teleport: 3.0
  vehicles: [Drone1, Drone2, Drone3, Drone4]
  cameras:
    - {name: "front_center", image_type: scene}

planner:
  type: gpu_mppi
  max_speed: 4.0
  replan_period: 0.2
  horizon: 20
  dt_plan: 0.05
  n_samples: 64
  resolution: 1.0
  inflate: 3          # match MPC pair YAML — pillars block z-dip,
                      # 7×7 horizontal forbidden region around each
                      # column forces S-curve in y/x plane
  goal_radius: 2.5
  safety_margin: 0.6
  use_prediction: true
  w_goal: 1.0
  w_obs: 200.0
  w_smooth: 0.05
  temperature: 1.0
  viz_rollouts: 8       # subsample per drone for anim overlay —
                        # 4 drones × 8 = 32 cyan lines / frame keeps
                        # the multi-drone rollout cloud readable

sensor:
  type: perfect

output:
  dir: results/airsim_multi_obstacles_demo_gpu_mppi
  save_camera_frames: true
