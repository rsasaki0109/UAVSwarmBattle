# Antipodal swap (6 drones) with a HETEROGENEOUS fleet — three fast drones and
# three slow ones — to test whether the right-of-way convention survives drones
# that are NOT interchangeable.
#
# This is the 2D antipodal-ring deadlock (every drone crosses to its antipode
# through one central hub). obstacles:none, so peer coordination is the ONLY
# thing the planner solves. The fleet alternates max_speed around the ring via
# planner.per_drone: drones d0/d2/d4 fly at 8.0, drones d1/d3/d5 at 2.0 — a 4x
# speed ratio, mean speed held at 5.0.
#
# WHY THIS MATTERS (docs/findings.md "The right-of-way convention is robust to
# speed heterogeneity — a 4x-mismatched fleet still rounds the hub"):
#
#   The lateral_bias right-of-way (veer RIGHT of the goal heading) breaks the
#   antipodal hub deadlock by turning the symmetric head-on convergence into a
#   clockwise roundabout. But a roundabout implicitly assumes everyone
#   circulates at a compatible pace — a fast drone could lap a slow one into the
#   hub and re-shatter it. It does not: across speed spreads up to this 4x ratio
#   the convention holds at 40/40 = 100 %, statistically tied with a homogeneous
#   fleet, zero collisions. The slow drones finish; the fast drones flow around
#   them. Speed mismatch is, if anything, a mild extra desync that complements
#   the convention rather than fighting it.
#
#   The convention is still doing the work: the SAME heterogeneous fleet with
#   lateral_bias: 0.0 collides ~35 % of the time (26/40, 14 collisions). Speed
#   heterogeneity alone is NOT a sufficient symmetry-breaker.
#
# Try it: this file has lateral_bias: 2.0 (100 %). Set it to 0.0 and the mixed
# fleet starts colliding at the hub:
#   uav-nav run examples/exp_multi_drone_antipodal_hetero_speed.yaml
#   uav-nav eval results/antipodal_hetero_speed_demo
# Reproduce the full spread sweep:
#   python scripts/antipodal_hetero_dynamics_phase.py --n 6 --spreads 2 4 6 --episodes 40
name: antipodal_hetero_speed_demo
seed: 1000
num_episodes: 20

scenario:
  type: multi_drone_grid
  size: [50, 50]
  resolution: 1.0
  obstacles:
    type: none
  drones:
    - name: d0
      start: [45.0, 25.0]
      goal:  [5.0, 25.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d1
      start: [35.0, 42.32]
      goal:  [15.0, 7.68]
      radius: 0.4
      start_jitter: 0.8
    - name: d2
      start: [15.0, 42.32]
      goal:  [35.0, 7.68]
      radius: 0.4
      start_jitter: 0.8
    - name: d3
      start: [5.0, 25.0]
      goal:  [45.0, 25.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d4
      start: [15.0, 7.68]
      goal:  [35.0, 42.32]
      radius: 0.4
      start_jitter: 0.8
    - name: d5
      start: [35.0, 7.68]
      goal:  [15.0, 42.32]
      radius: 0.4
      start_jitter: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1000
  max_accel: 6.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 5.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 32
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  lateral_bias: 2.0      # the fix: set to 0.0 and the mixed fleet collides ~35%
  predictor:
    type: constant_velocity
  # Heterogeneous fleet: alternate fast (8) / slow (2) around the ring, mean 5.
  per_drone:
    - {max_speed: 8.0}
    - {max_speed: 2.0}
    - {max_speed: 8.0}
    - {max_speed: 2.0}
    - {max_speed: 8.0}
    - {max_speed: 2.0}

sensor:
  type: perfect

output:
  dir: results/antipodal_hetero_speed_demo
