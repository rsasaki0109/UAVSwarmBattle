# AirSim sensor-latency limit-case ablation.
#
# PR #48's baseline AirSim latency sweep did not reproduce the dummy_3d
# cliff: SimpleFlight motor ramp smoothed stale-position command oscillation.
# This config pushes the two knobs most likely to bring the cliff back:
#   - max_speed = 15 m/s (3x the baseline)
#   - 420 same-altitude obstacles at z=30 (420 / 60^2 = 11.7% layer density)
#
# The obstacle field is planner-side only; AirSim Blocks mesh geometry is
# avoided by flying at altitude 30 m.  `random_layer` keeps the density
# readable without committing hundreds of explicit cells to this file.
#
# Sweep:
#   uav-nav sweep examples/exp_airsim_latency_limit.yaml \
#     --param sensor.delay=0.0,0.05,0.1,0.15,0.2,0.25,0.3 \
#     --param sensor.extrapolate=false,true \
#     --param num_episodes=10

name: airsim_latency_limit
seed: 42
num_episodes: 10

scenario:
  type: voxel_world
  size: [60, 60, 40]
  start: [2.0, 2.0, 30.0]
  goal: [55.0, 55.0, 30.0]
  resolution: 1.0
  obstacles:
    type: random_layer
    count: 420
    seed: 43
    z: 30

simulator:
  type: airsim
  host: 127.0.0.1
  port: 41451
  vehicle: Drone1
  dt: 0.05
  max_steps: 1500
  goal_radius: 1.5
  settle_after_reset: 1.0
  settle_after_teleport: 0.3

planner:
  type: mpc
  max_speed: 15.0
  replan_period: 0.2
  horizon: 20
  dt_plan: 0.05
  n_samples: 16
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: false
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05

sensor:
  type: delayed
  delay: 0.1
  dt: 0.05
  extrapolate: false
  position_noise_std: 0.0
  velocity_window: 1

output:
  dir: results/airsim_latency_limit
