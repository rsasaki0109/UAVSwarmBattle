# Antipodal swap (6 drones) with a fleet of MIXED AGILITY — three nimble drones
# and three sluggish ones — to test whether the right-of-way convention survives
# drones with different ACCELERATION limits (not just different cruise speeds).
#
# This is the 2D antipodal-ring deadlock (every drone crosses to its antipode
# through one central hub). obstacles:none, so peer coordination is the ONLY
# thing the planner solves. The fleet alternates max_accel around the ring via
# the NEW simulator.per_drone override (mirrors planner.per_drone, wired in the
# multi-drone builder): drones d0/d2/d4 are nimble (max_accel 10.5), d1/d3/d5
# are sluggish (1.5) — a 7x agility ratio, fleet-mean max_accel held at 6.0.
#
# WHY THIS MATTERS (docs/findings.md "The right-of-way convention is robust to
# ACCELERATION heterogeneity — until the roundabout out-turns the sluggish drones"):
#
#   The lateral_bias right-of-way breaks the antipodal hub deadlock by turning
#   the symmetric head-on convergence into a clockwise roundabout. Speed only
#   sets how fast a drone CRUISES; it is the acceleration limit that sets how
#   fast it can TURN — and a roundabout is made of turning. The worry is that a
#   sluggish drone, told to veer, cannot bend onto its lane and cuts the hub.
#
#   At this operating point it does not: across acceleration spreads up to this
#   7x ratio the convention holds at ~100 %, tied with a homogeneous fleet. The
#   reason is that the roundabout's curvature is gentle — its centripetal demand
#   (v^2 / r) sits far below even the sluggish drones' turning budget, so agility
#   is never the binding constraint. The convention is still doing the work: the
#   SAME mixed fleet with lateral_bias: 0.0 collides at the hub.
#
#   THE BOUNDARY: raise max_speed (e.g. to 11.0) and the centripetal demand
#   climbs until the sluggish drones can no longer hold their lane — the mixed
#   fleet then collapses (15/40) while a uniformly-nimble fleet still rounds the
#   hub (34/40). Acceleration heterogeneity bites the convention ONLY when the
#   roundabout is fast enough that turning becomes the binding constraint.
#
# Try it: this file has lateral_bias: 2.0 (rounds the hub). Set it to 0.0 and the
# mixed-agility fleet starts colliding:
#   uav-nav run examples/exp_multi_drone_antipodal_hetero_accel.yaml
#   uav-nav eval results/antipodal_hetero_accel_demo
# Reproduce the full sweep (robust at speed 5, boundary at speed 11):
#   python scripts/antipodal_hetero_accel_phase.py --base-speed 5 --spreads 3 6 9 --episodes 40
#   python scripts/antipodal_hetero_accel_phase.py --base-speed 11 --spreads 3 6 9 --episodes 40
name: antipodal_hetero_accel_demo
seed: 1000
num_episodes: 20

scenario:
  type: multi_drone_grid
  size: [50, 50]
  resolution: 1.0
  obstacles:
    type: none
  drones:
    - name: d0
      start: [45.0, 25.0]
      goal:  [5.0, 25.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d1
      start: [35.0, 42.32]
      goal:  [15.0, 7.68]
      radius: 0.4
      start_jitter: 0.8
    - name: d2
      start: [15.0, 42.32]
      goal:  [35.0, 7.68]
      radius: 0.4
      start_jitter: 0.8
    - name: d3
      start: [5.0, 25.0]
      goal:  [45.0, 25.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d4
      start: [15.0, 7.68]
      goal:  [35.0, 42.32]
      radius: 0.4
      start_jitter: 0.8
    - name: d5
      start: [35.0, 7.68]
      goal:  [15.0, 42.32]
      radius: 0.4
      start_jitter: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1000
  max_accel: 6.0          # fleet-mean; per_drone alternates nimble/sluggish below
  goal_radius: 1.5
  drone_radius: 0.4
  # Heterogeneous DYNAMICS: alternate nimble (10.5) / sluggish (1.5) around the
  # ring, mean max_accel 6.0. Raise the planner's max_speed to ~11 and the
  # sluggish drones can no longer hold the (now tighter-turning) roundabout.
  per_drone:
    - {max_accel: 10.5}
    - {max_accel: 1.5}
    - {max_accel: 10.5}
    - {max_accel: 1.5}
    - {max_accel: 10.5}
    - {max_accel: 1.5}

planner:
  type: mpc
  max_speed: 5.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 32
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  lateral_bias: 2.0      # the fix: set to 0.0 and the mixed fleet collides
  predictor:
    type: constant_velocity

sensor:
  type: perfect

output:
  dir: results/antipodal_hetero_accel_demo
