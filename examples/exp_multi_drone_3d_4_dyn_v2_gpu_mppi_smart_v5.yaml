# Smart MPPI v4 (mode-aware sampling) on §3 N=4 + 1 moving obstacle v=2.
# Splits rollouts into L/R clusters by lateral PC sign and emits the
# softmax-weighted action of the lower-cost cluster only — directly
# targets the §3 dynamic-obstacle cancellation mode.
name: multi_drone_3d_4_dyn_v2_gpu_mppi_smart_v5
seed: 42
num_episodes: 30

scenario:
  type: multi_drone_voxel
  size: [40, 40, 12]
  resolution: 1.0
  obstacles:
    type: random
    count: 30
    seed: 7
  dynamic_obstacles:
    - start: [20.0, 5.0, 6.0]
      velocity: [0.0, 2.0, 0.0]
      reflect: true
      radius: 0.8
  drones:
    - {name: east,  start: [3.0, 20.0, 6.0],  goal: [37.0, 20.0, 6.0], radius: 0.4}
    - {name: west,  start: [37.0, 20.0, 6.0], goal: [3.0, 20.0, 6.0],  radius: 0.4}
    - {name: north, start: [20.0, 3.0, 6.0],  goal: [20.0, 37.0, 6.0], radius: 0.4}
    - {name: south, start: [20.0, 37.0, 6.0], goal: [20.0, 3.0, 6.0],  radius: 0.4}

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: gpu_mppi
  max_speed: 8.0
  replan_period: 0.2
  horizon: 20
  dt_plan: 0.05
  n_samples: 64
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  temperature: 1.0
  mode_aware_sampling: true
  mode_aware_min_size: 8
  mode_aware_cost_ratio: 2.0

sensor:
  type: perfect

output:
  dir: results/multi_drone_3d_4_dyn_v2_gpu_mppi_smart_v5
