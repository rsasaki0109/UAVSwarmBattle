# CPU MPPI counterpart to exp_intersection_v1_mpc.yaml.
# Same intersection scenario: 2 drones N→S and E→W crossing paths with a
# slow dynamic intruder at the centre. n_samples=32 to keep CPU plan_dt
# reasonable; everything else mirrors the MPC config.
name: intersection_v1_noisy30_t10_mppi_n20
seed: 42
num_episodes: 20

scenario:
  type: multi_drone_voxel
  size: [40, 40, 12]
  resolution: 1.0
  obstacles:
    type: none
  drones:
    - name: north
      start: [20.0, 4.0, 6.0]
      goal:  [20.0, 36.0, 6.0]
      radius: 0.4
    - name: east
      start: [36.0, 20.0, 6.0]
      goal:  [4.0, 20.0, 6.0]
      radius: 0.4
  dynamic_obstacles:
    - start: [20.0, 20.0, 6.0]
      velocity: [0.5, 0.0, 0.0]
      reflect: true
      radius: 1.0

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 800
  max_accel: 80.0
  goal_radius: 1.0
  drone_radius: 0.4

planner:
  type: mppi
  max_speed: 6.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 32
  resolution: 1.0
  inflate: 1
  goal_radius: 1.0
  safety_margin: 0.5
  use_prediction: true
  predictor:
    type: noisy_velocity
    velocity_noise_std: 3.0
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  temperature: 1.0

sensor:
  type: perfect

output:
  dir: results/intersection_v1_noisy30_t10_mppi_n20
