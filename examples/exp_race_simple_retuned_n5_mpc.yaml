# Post-1646e11 dynamic-obstacle retune pilot.
#
# Goal: escape the all-planner collision floor seen in the old race /
# gates / dyn4 cells after the dynamic-obstacle freeze fix. This cell
# widens the oval (16 x 12 m), slows the reference to a 20 s period,
# and keeps two slow vertical-bouncing obstacles. Full-duration smoke
# uses max_steps=800 (= 2 loops x 20 s / 0.05 s).
#
# Pilot result (seeds 42-46, n=5, 2026-05-21):
#   MPC      n=8,h=40: per-drone 15/20 = 75 %, joint 0/5
#   GPU MPPI n=64,h=40: per-drone 20/20 = 100 %, joint 5/5
# Follow-up boundary probe: period=19.8/19.9 gives both planners 3/3
# joint success, while period=19.5 is floor-ish for both. The period=20
# MPC loss is therefore a narrow phase/geometry failure, not a smooth
# speed-hardness boundary; drone 1 collides at t=29.6 s with no named
# dynamic obstacle collision object.
# This is not paper-grade yet; promote to n=30 only after deciding
# whether the deterministic MPC drone-1 collision is the target
# separation or an over-easy GPU ceiling.
name: race_simple_retuned_n5_mpc
seed: 42
num_episodes: 5

scenario:
  type: multi_drone_aerobatic
  size: [40, 40, 14]
  resolution: 1.0
  n_drones: 4
  pattern: synchronized_loop
  center: [20.0, 20.0, 7.0]
  radius: 16.0
  radius_y: 12.0
  period: 20.0
  n_loops: 2
  normal_axis: z
  lookahead_t: 0.4
  drone_radius: 0.4
  obstacles:
    type: none
  dynamic_obstacles:
    - {start: [20.0, 6.0, 7.0], velocity: [0.0, 1.5, 0.0], reflect: true, radius: 1.0}
    - {start: [20.0, 34.0, 7.0], velocity: [0.0, -1.5, 0.0], reflect: true, radius: 1.0}

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 800
  max_accel: 80.0
  goal_radius: 0.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 8.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 8
  resolution: 1.0
  inflate: 0
  goal_radius: 0.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 0.3
  w_obs: 200.0
  w_smooth: 0.05
  ctg_cache_tolerance: 3

sensor:
  type: perfect

output:
  dir: results/race_simple_retuned_n5_mpc
