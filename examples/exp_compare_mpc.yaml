# Planner head-to-head — MPC at the validated Pareto config (n_samples=16,
# horizon=20) on the predictive (dynamic-obstacle) scenario. See
# exp_compare_astar.yaml for the full comparison table and discussion.
#
# REPLAN CADENCE — `replan_period` (0.2 here) is NOT a safety sweet-spot. Sweeping it
# on this scenario (scripts/mpc_replan_commitment_phase.py, docs/findings.md "More-
# frequent replanning is never counterproductive") shows the success curve is monotone
# at the calibrated operating point: replanning every control step (0.05 s) is best
# (76.7 %) and stretching to 1.6 s costs 25 points (b=18/c=3, p=0.0015). Freshness wins;
# the asserted "commitment between replans does safety work" reading is backwards in
# closed loop. (A dramatic 0.4 s collapse at one obstacle speed is a single-point
# artifact, not a resonance — it vanishes when the obstacle speed shifts.)
name: cmp_mpc
seed: 42
num_episodes: 30

scenario:
  type: grid_world
  size: [50, 50]
  start: [2.0, 2.0]
  goal: [45.0, 45.0]
  resolution: 1.0
  obstacles:
    type: random
    count: 25
    seed: 7
  dynamic_obstacles:
    - start: [25.0, 10.0]
      velocity: [0.0, 6.0]
      reflect: true
      radius: 0.8
    - start: [10.0, 30.0]
      velocity: [5.0, 0.0]
      reflect: true
      radius: 0.8
    - start: [35.0, 25.0]
      velocity: [-4.0, 3.0]
      reflect: true
      radius: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1500
  max_accel: 80.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 10.0
  replan_period: 0.2
  horizon: 20
  dt_plan: 0.05
  n_samples: 16
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05

sensor:
  type: perfect

output:
  dir: results/cmp_mpc
