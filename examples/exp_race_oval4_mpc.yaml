# Drone race scenario — 4 drones lap a horizontal oval circuit while a
# bouncing "intruder" (rogue drone / large bird) crosses the track from
# south to north. Each drone is phase-offset by 90°; they pursue a
# 0.4 s-lookahead point on the same reference ellipse. The dynamic
# obstacle is *not* on the reference trajectory, so the planner must
# detect and deflect around it without losing too much phase lock with
# the rest of the formation.
#
# Geometry: oval centered at (20, 20, 7) with x-semi-axis 12 m and
# y-semi-axis 8 m (radius_y). Period 12 s ⇒ tangential speed varies
# from 4.2 to 6.3 m/s. 2 laps = 24 s = 480 steps.
#
# Dynamic obstacle: starts just south of the oval at (20, 8, 7), moves
# +y at 6 m/s, radius 1.2 m, reflects off the world bounding box →
# crosses the oval interior roughly every 4 s.
#
# Hypothesis: MPC's argmin commits to a specific avoidance side per
# replan; GPU MPPI's softmax smooths between candidate avoidance
# directions. On a tight oval with a fast moving intruder we expect
# *both* the tracking-precision regime (mode 4: aerobatic, where softmax
# wins) and the dynamic-obstacle cancellation regime (mode 2, where
# softmax fails) to be visible at different moments in the same episode.
name: race_oval4_mpc
seed: 42
num_episodes: 30

scenario:
  type: multi_drone_aerobatic
  size: [40, 40, 14]
  resolution: 1.0
  n_drones: 4
  pattern: synchronized_loop
  center: [20.0, 20.0, 7.0]
  radius: 12.0
  radius_y: 8.0
  period: 12.0
  n_loops: 2
  normal_axis: z        # horizontal oval in xy plane
  lookahead_t: 0.4
  drone_radius: 0.4
  obstacles:
    type: none
  dynamic_obstacles:
    - start: [20.0, 8.0, 7.0]
      velocity: [0.0, 6.0, 0.0]
      reflect: true
      radius: 1.2

simulator:
  type: dummy_3d
  dt: 0.05
  max_steps: 480        # 2 laps × 12 s / 0.05 dt
  max_accel: 80.0
  goal_radius: 0.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 8.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 8
  resolution: 1.0
  inflate: 0
  goal_radius: 0.5
  safety_margin: 0.6
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  # Cache the Dijkstra cost-to-go across small lookahead drifts: the
  # moving reference goal would otherwise force a full recompute every
  # replan. Tolerance 3 cells ≈ 3 m of staleness in a 12-m oval.
  ctg_cache_tolerance: 3

sensor:
  type: perfect

output:
  dir: results/race_oval4_mpc
