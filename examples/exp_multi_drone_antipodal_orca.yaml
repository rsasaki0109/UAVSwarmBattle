# Antipodal swap (6 drones) on the canonical reciprocal baseline: ORCA.
#
# Six drones sit on a ring and each crosses to its ANTIPODE through the same
# central hub — the canonical hard swarm benchmark. obstacles:none, so peer
# coordination is the ONLY thing the planner must solve.
#
# THE BASELINE (docs/findings.md "ORCA is the missing reciprocal baseline, and
# the right-of-way convention generalises to it"): this repo's whole convention
# arc was measured against sibling MPC arms. ORCA (van den Berg et al. 2011,
# "Reciprocal n-Body Collision Avoidance"; reference OSS github.com/snape/RVO2)
# is the literature's canonical *reactive* baseline — no forecast, no sampling,
# just a velocity-space linear program where each agent takes half the avoidance
# responsibility. It is famous for deadlocking on exactly this benchmark: stock
# ORCA clears N<=4 but COLLIDES at the hub for N>=6 (the reciprocal dance
# converges every drone onto the centre) — the same place mpc+game_theoretic
# sits.
#
# THE FIX: planner.lateral_bias ports the MPC right-of-way knob to ORCA — it
# tilts the *preferred* velocity to the ego's RIGHT before the LP, so the
# symmetric convergence self-organises into a clockwise roundabout. Sweeping it
# (scripts/antipodal_orca_convention_phase.py, n=40, paired McNemar) rescues the
# deadlock to 100 % (N=8 best vs stock c=40/b=0, p=1.8e-12) — symmetry-breaking
# is planner-agnostic. It is an INVERTED-U band, double-edged: 0 collides at the
# hub, ~0.5 times out (over-rotation orbits), the [0.1, 0.45] band threads.
#
# Try it: flip lateral_bias between 0.0 (collides) and 0.2 (solved):
#   uav-nav run examples/exp_multi_drone_antipodal_orca.yaml
#   uav-nav eval results/antipodal_orca_demo
# Sweep / reproduce the full band:
#   python scripts/antipodal_orca_convention_phase.py --n-list 6 8 \
#       --bias-list 0 0.05 0.1 0.2 0.3 0.4 0.45 0.5 --episodes 40
name: antipodal_orca_demo
seed: 1000
num_episodes: 20

scenario:
  type: multi_drone_grid
  size: [50, 50]
  resolution: 1.0
  obstacles:
    type: none
  drones:
    - name: d0
      start: [45.0, 25.0]
      goal:  [5.0, 25.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d1
      start: [35.0, 42.32]
      goal:  [15.0, 7.68]
      radius: 0.4
      start_jitter: 0.8
    - name: d2
      start: [15.0, 42.32]
      goal:  [35.0, 7.68]
      radius: 0.4
      start_jitter: 0.8
    - name: d3
      start: [5.0, 25.0]
      goal:  [45.0, 25.0]
      radius: 0.4
      start_jitter: 0.8
    - name: d4
      start: [15.0, 7.68]
      goal:  [35.0, 42.32]
      radius: 0.4
      start_jitter: 0.8
    - name: d5
      start: [35.0, 7.68]
      goal:  [15.0, 42.32]
      radius: 0.4
      start_jitter: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1000
  max_accel: 6.0
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: orca
  max_speed: 5.0
  radius: 0.4
  time_horizon: 2.0       # reciprocal lookahead (s)
  time_step: 0.25         # step used only for the overlapping-recovery case
  neighbor_dist: 15.0
  safety_margin: 0.1
  goal_radius: 1.5
  lateral_bias: 0.2       # 0.0 = collides at hub; 0.2 = 100% (band [0.1, 0.45])

sensor:
  type: perfect

output:
  dir: results/antipodal_orca_demo
