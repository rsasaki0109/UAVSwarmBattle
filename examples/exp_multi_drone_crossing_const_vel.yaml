# Constant-velocity peer prediction on a 2-drone perpendicular crossing — BASELINE.
#
# Identical to exp_multi_drone_crossing_game_theoretic.yaml except the peer
# predictor coasts in a straight line (no goal awareness). The control: any
# joint-success gap is attributable to the one best-response step game_theoretic
# adds. See that file's header for the honest paired finding (this baseline
# collides ~12% of the time in the mid-accel band where game_theoretic does not).
#   uav-nav run examples/exp_multi_drone_crossing_const_vel.yaml
#   uav-nav eval results/mdx_const_vel
name: mdx_const_vel
seed: 42
num_episodes: 60

scenario:
  type: multi_drone_grid
  size: [50, 50]
  resolution: 1.0
  obstacles:
    type: none
  drones:
    - name: east
      start: [4.0, 25.0]
      goal:  [46.0, 25.0]
      radius: 0.4
      start_jitter: 0.8   # break the mirror symmetry; vary the encounter per seed
    - name: north
      start: [25.0, 4.0]
      goal:  [25.0, 46.0]
      radius: 0.4
      start_jitter: 0.8

simulator:
  type: dummy_2d
  dt: 0.05
  max_steps: 1000
  max_accel: 6.0           # low accel → must commit on the forecast, not dodge late
  goal_radius: 1.5
  drone_radius: 0.4

planner:
  type: mpc
  max_speed: 5.0
  replan_period: 0.2
  horizon: 40
  dt_plan: 0.05
  n_samples: 32
  resolution: 1.0
  inflate: 1
  goal_radius: 1.5
  safety_margin: 0.5
  use_prediction: true
  w_goal: 1.0
  w_obs: 100.0
  w_smooth: 0.05
  predictor:
    type: constant_velocity

sensor:
  type: perfect

output:
  dir: results/mdx_const_vel
